name: Rust CI Pipeline

on:
  push:
    branches:
  pull_request:
    branches:

env:
  CARGO_TERM_COLOR: always
  RUST_MIN_STACK: 67108864 # 64MiB

jobs:
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.85'
      - name: Check
        run: cargo check --workspace

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt -- --check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Clippy (no default features)
        run: cargo clippy --no-default-features --features le_bins,be_bins -- -D warnings
      - name: Clippy webgraph (all features except slow_tests)
        run: cargo clippy -p webgraph --features fuzz,serde -- -D warnings
      - name: Test webgraph
        run: RUST_BACKTRACE=full cargo test -p webgraph --verbose
      - name: Test webgraph-algo
        run: RUST_BACKTRACE=full cargo test -p webgraph-algo --verbose
      - name: Test webgraph-cli
        run: RUST_BACKTRACE=full cargo test -p webgraph-cli --verbose
      - name: Test webgraph (no default features)
        run: RUST_BACKTRACE=full cargo test -p webgraph --no-default-features --verbose
      - name: Test webgraph (features fuzz,serde)
        run: RUST_BACKTRACE=full cargo test -p webgraph --features fuzz,serde --verbose
      - name: Test webgraph-cli (no default features)
        run: RUST_BACKTRACE=full cargo test -p webgraph-cli --no-default-features --features le_bins,be_bins --verbose

  coverage:
    needs: build
    name: coverage
    runs-on: ubuntu-latest
    container:
      image: xd009642/tarpaulin:develop-nightly
      options: --security-opt seccomp=unconfined
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate code coverage
        run: |
          cargo +nightly tarpaulin --verbose --engine llvm --all-features --workspace --out Lcov

      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: "lcov.info"

  build-i686:
    runs-on: ubuntu-latest
    env:
      RUST_MIN_STACK: 67108864 # 64MiB
    steps:
      - uses: actions/checkout@v6
      - name: Install 32-bit support
        run: sudo apt-get update && sudo apt-get install -y gcc-multilib
      - name: Add i686 target
        run: rustup target add i686-unknown-linux-gnu
      - name: Build (32-bit)
        run: cargo build --target i686-unknown-linux-gnu
      - name: Test (32-bit)
        run: cargo test --target i686-unknown-linux-gnu
